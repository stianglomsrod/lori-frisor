# Lettvekts-CI: typesjekk + produksjonsbygg på hver push/PR mot main.
# Fanger at innholds-commits fra Keystatic (eieren) aldri knekker bygget.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
        env:
          # Bygget skal være grønt også uten e-postoppsett (SMS-fallback).
          VERCEL: ""
